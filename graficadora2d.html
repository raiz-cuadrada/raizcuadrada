function calculate2DFunction(eqStr, color, lineStyle = 'solid', opacity = 1 , params) {
    if (!eqStr || !eqStr.trim()) return null;

    const { xmin, xmax, ymin, ymax } = dynamicRange;
    const res = RESOLUTION;

    const clean = eqStr.replace(/\s+/g, '');

    
    const isExplicit =
        clean.startsWith('y=') ||
        (!clean.includes('=') && !/(^|[^a-zA-Z])y([^a-zA-Z]|$)/.test(clean));

    
    if (isExplicit) {
        let expression = clean;
        if (expression.startsWith('y=')) {
            expression = expression.slice(2);
        }

        let expr;
        try {
            expr = math.compile(normalizeInput(expression));
        } catch {
            return null;
        }

        const xVals = [];
        const yVals = [];

        const step = (xmax - xmin) / res;

        for (let i = 0; i <= res; i++) {
            const x = xmin + i * step;

            try {
               const y = expr.evaluate({ x, ...params });

                if (typeof y === 'number' && isFinite(y)) {
                    xVals.push(x);
                    yVals.push(y);
                } else {
                    xVals.push(x);
                    yVals.push(null);
                }
            } catch {
                xVals.push(x);
                yVals.push(null);
            }
        }

        return {
            type: 'scatter',
            mode: 'lines',
            x: xVals,
            y: yVals,
            line: {
                color,
                width: 2,
                dash: lineStyle
            },
            opacity,
            hoverinfo: 'x+y'
        };
    }

    

    let expression = clean;
    if (clean.includes('=')) {
        const [lhs, rhs] = clean.split('=');
        expression = `(${lhs}) - (${rhs})`;
    }

    let expr;
    try {
        expr = math.compile(normalizeInput(expression));
    } catch {
        return null;
    }

    const xVals = [];
    const yVals = [];
    const zVals = [];

    for (let i = 0; i < res; i++) {
        xVals.push(xmin + (xmax - xmin) * i / (res - 1));
        yVals.push(ymin + (ymax - ymin) * i / (res - 1));
    }

    for (let i = 0; i < res; i++) {
        const row = [];
        for (let j = 0; j < res; j++) {
            try {
                const z = expr.evaluate({
    x: xVals[j],
    y: yVals[i],
    ...params
});

                row.push(isFinite(z) ? z : NaN);
            } catch {
                row.push(NaN);
            }
        }
        zVals.push(row);
    }

  return {
        type: 'contour',
        x: xVals,
        y: yVals,
        z: zVals,
        contours: {
            start: 0,
            end: 0,
            size: 0, 
            coloring: 'lines'
        },
        
        colorscale: [
            [0, color], 
            [1, color]
        ],
        
        line: {
            
            
            width: 2,
            dash: lineStyle
        },
        showscale: false,
        opacity,
        hoverinfo: 'skip'
    };
}

function updateTable() {
    const xmin = parseFloat(document.getElementById('table-xmin').value);
    const xmax = parseFloat(document.getElementById('table-xmax').value);
    const step = parseFloat(document.getElementById('table-step').value);

    const rows = document.querySelectorAll('.func-row');
    const container = document.getElementById('table-content');

    let html = '<table border="1" cellpadding="4" style="border-collapse:collapse;">';
    html += '<tr><th>x</th>';

    const functions = [];

    rows.forEach((row, i) => {
        const eq = row.querySelector('.eq-input').value.trim();
        if (!eq) return;

        
        if (eq.includes('=') && !eq.startsWith('y=')) return;

        const label =
            row.querySelector('.func-label')?.value || `f${i + 1}`;

        try {
            const expr = math.compile(
                normalizeInput(eq.startsWith('y=') ? eq.slice(2) : eq)
            );
            functions.push({ label, expr });
            html += `<th>${label}</th>`;
        } catch {}
    });

    html += '</tr>';

    for (let x = xmin; x <= xmax + 1e-9; x += step) {
        html += `<tr><td>${x.toFixed(3)}</td>`;

        functions.forEach(f => {
            let y = '';
            try {
                const val = f.expr.evaluate({ x });
                y = isFinite(val) ? val.toFixed(4) : '—';
            } catch {
                y = '—';
            }
            html += `<td>${y}</td>`;
        });

        html += '</tr>';
    }

    html += '</table>';
    container.innerHTML = html;
}

function normalizeInput(str) {
    
    let s = str.toLowerCase().trim();

    
    s = s.replace(/²/g, '^2');       
    s = s.replace(/³/g, '^3'); 
     s = s.replace(/⁴/g, '^4');
      s = s.replace(/⁵/g, '^5');
       s = s.replace(/⁶/g, '^6');
        s = s.replace(/⁷/g, '^7')
           s = s.replace(/⁸/g, '^8');
             s = s.replace(/⁹/g, '^9');
               s = s.replace(/ˣ/g, '^x');
    s = s.replace(/√/g, 'sqrt');     
    s = s.replace(/π/g, 'pi');       
   

    
    s = s.replace(/sen/g, 'sin');

    
    
    const funcs = ['sin', 'cos', 'tan', 'sqrt', 'log', 'exp', 'abs'];
    funcs.forEach(fn => {
        
        const re = new RegExp(`${fn}([xyz])`, 'g'); 
        s = s.replace(re, `${fn}($1)`);
    });

    
    
    
    s = s.replace(/(\d)([a-z\(])/g, '$1*$2');
    
    
    s = s.replace(/(\))([a-z\d\(])/g, '$1*$2');

    
    funcs.forEach(fn => {
        const re = new RegExp(`([xyz])${fn}`, 'g');
        s = s.replace(re, `$1*${fn}`);
    });
    
    
    
    
    s = s.replace(/([xyz])([xyz])/g, '$1*$2');

    return s;
}

function extractParameters(expr) {
    const clean = expr.replace(/\s+/g, '');
    const matches = clean.match(/[a-z]/g) || [];

    return [...new Set(
        matches.filter(l => l !== 'x' && l !== 'y')
    )];
}

function toggleSpecialPoints(button) {
    const row = button.closest('.func-row');
    const eqStr = row.querySelector('.eq-input')?.value.trim();
    if (!eqStr) return;

    const color = row.querySelector('.eq-color')?.value || '#ef4444';

    
    let expr;
    try {
        let clean = normalizeInput(eqStr);
        if (clean.startsWith('y=')) clean = clean.slice(2);
        expr = math.compile(clean);
    } catch {
        return;
    }

    const { xmin, xmax } = dynamicRange;

    const SAMPLE_POINTS = 200;        
    const MAX_POINTS = 10;            
    const dx = (xmax - xmin) / SAMPLE_POINTS;

    const samples = [];

    for (let i = 0; i <= SAMPLE_POINTS; i++) {
        const x = xmin + i * dx;
        let y;
        try {
            y = expr.evaluate({ x });
            if (!isFinite(y)) continue;
            samples.push({ x, y });
        } catch {}
    }

    const special = [];

    
    const y0 = samples.find(p => Math.abs(p.x) < dx);
    if (y0) special.push({ ...y0, type: 'Y' });

    
    for (let i = 1; i < samples.length && special.length < MAX_POINTS; i++) {
        const a = samples[i - 1];
        const b = samples[i];
        if (a.y === 0 || a.y * b.y < 0) {
            const x = (a.x + b.x) / 2;
            special.push({ x, y: 0, type: 'X' });
        }
    }

    
    for (let i = 1; i < samples.length - 1 && special.length < MAX_POINTS; i++) {
        const prev = samples[i - 1];
        const curr = samples[i];
        const next = samples[i + 1];

        if (prev.y < curr.y && next.y < curr.y) {
            special.push({ ...curr, type: 'max' });
        }
        if (prev.y > curr.y && next.y > curr.y) {
            special.push({ ...curr, type: 'min' });
        }
    }

    
    const points = special.slice(0, MAX_POINTS);

    if (!points.length) return;

    
    const trace = {
        type: 'scatter',
        mode: 'markers',
        x: points.map(p => p.x),
        y: points.map(p => p.y),
        marker: {
            size: 12,
            color: color,
            line: { width: 2, color: '#000' },
            symbol: points.map(p => {
                if (p.type === 'X') return 'x';
                if (p.type === 'Y') return 'circle';
                if (p.type === 'max') return 'triangle-up';
                if (p.type === 'min') return 'triangle-down';
                return 'circle';
            })
        },
        hovertemplate:
            'x=%{x:.3f}<br>y=%{y:.3f}<extra></extra>'
    };

    Plotly.addTraces('plot-container', trace);
}


function adaptiveResolution() {
    const spanX = dynamicRange.xmax - dynamicRange.xmin;

    if (spanX < 5) return 600;
    if (spanX < 20) return 400;
    if (spanX < 50) return 300;
    return 200;
}
