    const overlay = document.getElementById('mobile-rotate-overlay');
    const docEl = document.documentElement;

    try {
        
        if (docEl.requestFullscreen) {
            await docEl.requestFullscreen();

            await docEl.webkitRequestFullscreen();
        } else if (docEl.msRequestFullscreen) {

            try {

function renderGraph() {

                        gridcolor: gridHex,

                        backgroundcolor: bgHex,

                    },

                        eye: {x: 1.5, y: 1.5, z: 1.2}
                    },
                    aspectratio: {x: 1, y: 1, z: 1}
                }
            };

    
    const rows = document.querySelectorAll('.func-row');
    const allTraces = [];
    const res = parseInt(document.getElementById('resInput').value);
    
    
    const showMesh = document.getElementById('showMesh').checked;
    const meshColor = document.getElementById('meshColor').value;     
    const meshDensity = parseInt(document.getElementById('meshDensity').value); 

    rows.forEach(row => {
        const eqStr = row.querySelector('.eq-input').value;
        const type = row.querySelector('.eq-type').value;
        const scheme = row.querySelector('.scheme-select').value;
        const colorHex = row.querySelector('.eq-color').value;
const opacity = parseFloat(
    row.querySelector('.opacity-slider')?.value ?? 1
);

        let activeScale;
        if (scheme === 'solid') {
            activeScale = [[0, colorHex], [1, colorHex]];
        } else {
            activeScale = scheme;
        }

        try {
            let trace = null;
            if (type === 'explicit') {
                
                trace = calculateExplicit(eqStr, range, res, showMesh, activeScale, meshColor, meshDensity, opacity);
            } else {
                trace = calculateImplicit(eqStr, range, res, showMesh, activeScale, opacity);
            }
            if (trace) allTraces.push(trace);
        } catch (error) { console.error(error); }
    });

    Plotly.newPlot('plot-container', allTraces, layout, {responsive: true, displaylogo: false});
    updateLatexPanel();
}


function calculateExplicit(eqStr, r, steps, showMesh, finalScale, meshColor, meshDensity, opacity) {
    const cleanEq = normalizeInput(eqStr); 
    
    
    const expr = math.compile(cleanEq);
    const x = [], y = [], z = [];
    const stepSize = (2 * r) / steps;
    
    
    for (let j = 0; j <= steps; j++) {
        const yVal = -r + j * stepSize;
        const currentRow = [];
        for (let i = 0; i <= steps; i++) {
            const xVal = -r + i * stepSize;
            if (j === 0) x.push(xVal);
            try {
                let zVal = expr.evaluate({x: xVal, y: yVal});
                if (Math.abs(zVal) > 1000) zVal = null; 
                currentRow.push(zVal);
            } catch (e) { currentRow.push(null); }
        }
        y.push(yVal);
        z.push(currentRow);
    }

    
    
    const contourInterval = (2 * r) / meshDensity; 
    
    const meshConfig = showMesh ? {
        show: true, 
        color: meshColor, 
        width: 1.5,
        start: -r, end: r, 
        size: contourInterval, 
        project: { z: false }
    } : { show: false };

    return {
        type: 'surface',
        z: z, x: x, y: y,
        showscale: false,
        contours: {
            z: { show: true, usecolormap: true, project: { z: true } },
            x: meshConfig, 
            y: meshConfig  
        },
        colorscale: finalScale,
        opacity: opacity, 
       lighting: {
    ambient: lightingConfig.ambient,
    diffuse: lightingConfig.diffuse,
    specular: lightingConfig.specular,
    roughness: lightingConfig.roughness,
    fresnel: lightingConfig.fresnel
}

    };
}


function calculateImplicit(eqStr, r, steps, showMesh, finalScale,  opacity) {
    
    const cleanEq = normalizeInput(eqStr);
    
    const expr = math.compile(cleanEq);
    const safeSteps = Math.min(steps, 50); 
    const x = [], y = [], z = [], values = [];
    const stepSize = (2 * r) / (safeSteps - 1);

    for (let k = 0; k < safeSteps; k++) {
        const zVal = -r + k * stepSize;
        for (let j = 0; j < safeSteps; j++) {
            const yVal = -r + j * stepSize;
            for (let i = 0; i < safeSteps; i++) {
                const xVal = -r + i * stepSize;
                x.push(xVal); y.push(yVal); z.push(zVal);
                try {
                    values.push(expr.evaluate({x: xVal, y: yVal, z: zVal}));
                } catch (e) { values.push(NaN); }
            }
        }
    }

    

return {
    type: 'isosurface',
    x: x, y: y, z: z,
    value: values,

    isomin: -0.15,
    isomax:  0.15,

    opacity: opacity,
    colorscale: finalScale,
    showscale: false,

    surface: { count: 1 },
    
    lighting: {
        ambient: lightingConfig.ambient,
        diffuse: lightingConfig.diffuse,
        specular: lightingConfig.specular,
        roughness: lightingConfig.roughness,
        fresnel: lightingConfig.fresnel
    },

    caps: {
        x: { show: false },
        y: { show: false },
        z: { show: false }
    }
};

    
}

function updateLatexPanel() {
    const container = document.getElementById('latex-content');
    const rows = document.querySelectorAll('.func-row');
    let htmlContent = '';

    rows.forEach(row => {
        const rawEq = row.querySelector('.eq-input').value;
        const type = row.querySelector('.eq-type').value;
        const color = row.querySelector('.eq-color').value; 
        
        
        
        const cleanEq = normalizeInput(rawEq);

        try {
            const node = math.parse(cleanEq);
            let latex = node.toTex();

            
            let displayEq = '';
            if (type === 'explicit') {
                displayEq = `z = ${latex}`;
            } else {
                displayEq = `${latex} = 0`;
            }

            
            htmlContent += `
                <div class="latex-item">
                    <span class="color-dot" style="background:${color}"></span>
                    <div>$$ ${displayEq} $$</div>
                </div>
            `;
        } catch (e) {
            
            htmlContent += `
                <div class="latex-item">
                    <span class="color-dot" style="background:transparent"></span>
                 <span style="color:#ef4444; font-size:0.75em">
    Sintaxis incompleta…
</span>

                </div>`;
        }
    });

    
    container.innerHTML = htmlContent;
    
    
    if (window.MathJax) {
        MathJax.typesetPromise([container]).catch((err) => console.log(err));
    }
}

function normalizeInput(str) {
    
    let s = str.toLowerCase().trim();

    
    s = s.replace(/²/g, '^2');       
    s = s.replace(/³/g, '^3'); 
     s = s.replace(/⁴/g, '^4');
      s = s.replace(/⁵/g, '^5');
       s = s.replace(/⁶/g, '^6');
        s = s.replace(/⁷/g, '^7')
           s = s.replace(/⁸/g, '^8');
             s = s.replace(/⁹/g, '^9');
               s = s.replace(/ˣ/g, '^x');
    s = s.replace(/√/g, 'sqrt');     
    s = s.replace(/π/g, 'pi');       
   

    
    s = s.replace(/sen/g, 'sin');

    
    
    const funcs = ['sin', 'cos', 'tan', 'sqrt', 'log', 'exp', 'abs'];
    funcs.forEach(fn => {
        
        const re = new RegExp(`${fn}([xyz])`, 'g'); 
        s = s.replace(re, `${fn}($1)`);
    });

    
    
    
    s = s.replace(/(\d)([a-z\(])/g, '$1*$2');
    
    
    s = s.replace(/(\))([a-z\d\(])/g, '$1*$2');

    
    funcs.forEach(fn => {
        const re = new RegExp(`([xyz])${fn}`, 'g');
        s = s.replace(re, `$1*${fn}`);
    });
    
    
    
    
    s = s.replace(/([xyz])([xyz])/g, '$1*$2');

    return s;
}

function insertQuadrica(q) {
    
    const rows = document.querySelectorAll('.func-row');

    let targetRow = null;

    
    rows.forEach(row => {
        const type = row.querySelector('.eq-type').value;
        if (type === q.type && !targetRow) {
            targetRow = row;
        }
    });

    
    if (!targetRow) {
        addFunction(q.type);
        targetRow = document.querySelectorAll('.func-row');
        targetRow = targetRow[targetRow.length - 1];
    }

    
    const input = targetRow.querySelector('.eq-input');
    input.value = q.eq;
    input.focus();

    renderGraph();

}
